<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 12 76 76">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0055DD"/>
      <stop offset="25%" stop-color="#00AAEE"/>
      <stop offset="50%" stop-color="#00CCFF"/>
      <stop offset="75%" stop-color="#8844EE"/>
      <stop offset="100%" stop-color="#CC22AA"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1166DD"/>
      <stop offset="100%" stop-color="#00CCEE"/>
    </linearGradient>
  </defs>

  <!--
    Ring diameter ≈ 2/3 of viewBox (100)
    center=(50,50), outer_r=33, stroke-width=7
    inner_r = 33 - 3.5 = 29.5
  -->
  <circle cx="50" cy="50" r="29.5" fill="none" stroke="url(#ringGrad)" stroke-width="7"/>

  <!-- Gauge segment gaps (upper-right 260-320°) -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round">
    <!-- 260°: outer(44.2,17.2) → inner(45.6,22.0) -->
    <line x1="44.2" y1="17.2" x2="45.6" y2="22.0"/>
    <!-- 280°: outer(55.8,17.2) → inner(54.4,22.0) -->
    <line x1="55.8" y1="17.2" x2="54.4" y2="22.0"/>
    <!-- 300°: outer(66.5,50) → inner(62.5,50) -->
    <line x1="66.5" y1="50" x2="62.5" y2="50"/>
    <!-- 320°: outer(60.3,71.3) → inner(57.5,68.1) -->
    <line x1="60.3" y1="71.3" x2="57.5" y2="68.1"/>
  </g>

  <!--
    Bar chart: 3 bars, ENTIRE GROUP centered at x=50
    bar width=8, gap=4 → total=32, starts at x=34
  -->
  <g>
    <rect x="34" y="50" width="8" height="20" rx="1.5" fill="url(#barGrad)"/>
    <rect x="46" y="43" width="8" height="27" rx="1.5" fill="url(#barGrad)"/>
    <rect x="58" y="36" width="8" height="34" rx="1.5" fill="url(#barGrad)"/>
  </g>

  <!-- Zigzag line chart -->
  <polyline
    points="24,68 29,63 35,67 41,61 47,66 53,62 59,65 64,60 69,64"
    fill="none"
    stroke="#1133AA"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Dot at end -->
  <circle cx="69" cy="64" r="2.8" fill="#1133AA"/>
  <circle cx="69" cy="64" r="1.2" fill="white"/>
</svg>
