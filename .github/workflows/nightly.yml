name: Nightly

on:
    schedule:
        - cron: "0 2 * * *" # 2:00 AM UTC daily
    workflow_dispatch:

jobs:
    full-test:
        name: Full test suite
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-2022]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm check
            - run: pnpm test
            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
            - name: Start Xvfb
              if: runner.os == 'Linux'
              run: Xvfb :99 -screen 0 1024x768x24 &
            - name: Run Electron E2E tests
              run: pnpm test:e2e:electron
              env:
                  DISPLAY: ":99"

    package:
        name: Package build
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-2022
                      platform: win
                    - os: ubuntu-latest
                      platform: linux
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - name: Package
              run: pnpm package
              env:
                  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
            - name: Verify packaged output exists
              run: test -d out
