name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag name (e.g. v1.0.0)"
                required: true

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.platform }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-2022
                      platform: win
                    - os: macos-latest
                      platform: mac
                    - os: ubuntu-latest
                      platform: linux
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Build and package
              # --publish never: electron-builder defaults to onTagOrDraft and
              # would try to upload (needing GH_TOKEN). We upload separately in
              # the release job below to avoid dual-upload 422 collisions.
              run: pnpm build && pnpm exec electron-builder --${{ matrix.platform }} --publish never
              env:
                  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: artifacts-${{ matrix.platform }}
                  path: |
                      artifacts/*.exe
                      artifacts/*.exe.blockmap
                      artifacts/*.dmg
                      artifacts/*.dmg.blockmap
                      artifacts/*.zip
                      artifacts/*.zip.blockmap
                      artifacts/*.AppImage
                      artifacts/*.deb
                      artifacts/*.rpm
                      artifacts/latest*.yml
                  if-no-files-found: warn
                  retention-days: 1

    release:
        name: Publish to GitHub Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: artifacts-*
                  merge-multiple: true
                  path: artifacts

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      artifacts/*.exe
                      artifacts/*.exe.blockmap
                      artifacts/*.dmg
                      artifacts/*.dmg.blockmap
                      artifacts/*.zip
                      artifacts/*.zip.blockmap
                      artifacts/*.AppImage
                      artifacts/*.deb
                      artifacts/*.rpm
                      artifacts/latest*.yml
                  generate_release_notes: true
                  draft: true
                  tag_name: ${{ github.event.inputs.tag || github.ref_name }}
                  # overwrite handles re-runs of the same tag (draft asset replace).
                  overwrite: true
